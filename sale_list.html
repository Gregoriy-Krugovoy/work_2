<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Список покупок</title>
</head>
<body>
<h2>Список покупок</h2>
<h4>МЯСО И РЫБА</h4>
<ul>
    <li>Грудка<input type="checkbox" name="grudka" value="grudka"></li>
    <li>Индейка<input type="checkbox" name="indeyka" value="indeyka"></li>
    <li>Фарш<input type="checkbox" name="farsh" value="farsh"></li>
</ul>
<h4>ФРУКТЫ И ОВОЩИ</h4>
<ul>
    <li>Лимон<input type="checkbox" name="limon" value="limon"></li>
    <li>Бананы<input type="checkbox" name="banan" value="banan"></li>
    <li>Мандарины<input type="checkbox" name="mandarini" value="mandarini"></li>
</ul>
<h4>СУХОФРУКТЫ</h4>
<ul>
    <li>Изюм<input type="checkbox" name="izum" value="izum"></li>
    <li>Орешки<input type="checkbox" name="orehi" value="orehi"></li>
    <li>Семечки<input type="checkbox" name="semki" value="semki"></li>
</ul>
<h4>ХЛЕБОБУЛОЧНЫЕ</h4>
<ul>
    <li>Хлеб<input type="checkbox" name="hleb" value="hleb"></li>
</ul>
<h4>СОУСЫ</h4>
<ul>
    <li>Майонез оливковый<input type="checkbox" name="mayonez_olivkoviy" value="mayonez_olivkoviy"></li>
    <li>Майонез провансаль<input type="checkbox" name="mayonez_provansal" value="mayonez_provansal"></li>
    <li>Кетчуп<input type="checkbox" name="ketcup" value="ketcup"></li>
</ul>
</body>
</html>
